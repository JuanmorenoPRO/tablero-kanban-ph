<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban — Contabilidad Residencial</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Kanban Residencial</h1>
    <p class="subtitulo">Gestión de tareas · Contabilidad de Unidades Residenciales</p>
    <div class="nav-btns">
      <button class="scroll-btn" onclick="document.querySelector('.asignaciones-section').scrollIntoView({behavior:'smooth'})">
        ↓ Ver asignaciones por persona
      </button>
      <button class="scroll-btn" onclick="document.querySelector('.unidades-section').scrollIntoView({behavior:'smooth'})">
        ↓ Ver por unidad residencial
      </button>
    </div>
    <div class="add-task-bar">
      <input type="text" id="task-input" placeholder="Nueva tarea..." maxlength="120" />
      <input type="text" id="unidad-input" placeholder="Unidad residencial..." maxlength="80" />
      <button id="add-btn">+ Agregar</button>
    </div>
  </header>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Buscar por tarea, unidad o persona..." />
  </div>

  <main class="board">
    <div class="column" id="col-todo">
      <div class="column-header">Pendiente</div>
      <div class="cards" data-col="todo"></div>
    </div>

    <div class="column" id="col-inprogress">
      <div class="column-header">En Progreso</div>
      <div class="cards" data-col="inprogress"></div>
    </div>

    <div class="column" id="col-done">
      <div class="column-header">Completado</div>
      <div class="cards" data-col="done"></div>
    </div>
  </main>

  <section class="asignaciones-section">
    <div class="asignaciones-top-bar">
      <h2>Asignaciones por Persona</h2>
      <button class="scroll-btn scroll-btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        ↑ Volver al tablero
      </button>
    </div>
    <div id="asignaciones-container">
      <p class="empty-message">Sin asignaciones aún.</p>
    </div>
  </section>

  <section class="unidades-section">
    <div class="asignaciones-top-bar">
      <h2>Resumen por Unidad Residencial</h2>
      <button class="scroll-btn scroll-btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        ↑ Volver al tablero
      </button>
    </div>
    <div id="unidades-container">
      <p class="empty-message">Sin unidades residenciales registradas aún.</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
