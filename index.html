<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban — Contabilidad Residencial</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <header>
    <h1>Kanban Residencial</h1>
    <p class="subtitulo">Gestión de tareas · Contabilidad de Unidades Residenciales</p>
    <div class="nav-btns">
      <button class="scroll-btn" onclick="document.querySelector('.asignaciones-section').scrollIntoView({behavior:'smooth'})">
        ↓ Ver asignaciones por persona
      </button>
      <button class="scroll-btn" onclick="document.querySelector('.unidades-section').scrollIntoView({behavior:'smooth'})">
        ↓ Ver por unidad residencial
      </button>
      <button class="scroll-btn btn-chart-global" onclick="openStatusChart()">
        📊 Resumen general
      </button>
    </div>
    <div class="add-task-bar">
      <input type="text" id="task-input" placeholder="Nueva tarea..." maxlength="120" />
      <input type="text" id="unidad-input" placeholder="Unidad residencial..." maxlength="80" />
      <button id="add-btn">+ Agregar</button>
    </div>
  </header>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Buscar por tarea, unidad o persona..." />
  </div>

  <main class="board">
    <div class="column" id="col-todo">
      <div class="column-header">Pendiente</div>
      <div class="cards" data-col="todo"></div>
    </div>

    <div class="column" id="col-inprogress">
      <div class="column-header">En Progreso</div>
      <div class="cards" data-col="inprogress"></div>
    </div>

    <div class="column" id="col-done">
      <div class="column-header">Completado</div>
      <div class="cards" data-col="done"></div>
    </div>
  </main>

  <section class="asignaciones-section">
    <div class="asignaciones-top-bar">
      <h2>Asignaciones por Persona</h2>
      <button class="scroll-btn scroll-btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        ↑ Volver al tablero
      </button>
    </div>
    <div class="section-filter-bar">
      <input type="text" id="filter-asignaciones" placeholder="🔍 Filtrar por persona..." />
      <button class="btn-chart-section" onclick="openTeamLoadChart()">📊 Carga del equipo</button>
    </div>
    <div id="asignaciones-container">
      <p class="empty-message">Sin asignaciones aún.</p>
    </div>
  </section>

  <section class="unidades-section">
    <div class="asignaciones-top-bar">
      <h2>Resumen por Unidad Residencial</h2>
      <button class="scroll-btn scroll-btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        ↑ Volver al tablero
      </button>
    </div>
    <div class="section-filter-bar">
      <input type="text" id="filter-unidades" placeholder="🔍 Filtrar por unidad residencial..." />
    </div>
    <div id="unidades-container">
      <p class="empty-message">Sin unidades residenciales registradas aún.</p>
    </div>
  </section>

  <!-- Modal: Resumen general (doughnut) -->
  <div id="modal-status" class="chart-modal" hidden>
    <div class="chart-modal-overlay" onclick="closeModal('modal-status')"></div>
    <div class="chart-modal-box">
      <div class="chart-modal-header">
        <h3>Resumen General de Tareas</h3>
        <button class="chart-modal-close" onclick="closeModal('modal-status')">✕</button>
      </div>
      <div class="chart-modal-body">
        <canvas id="chart-status"></canvas>
      </div>
    </div>
  </div>

  <!-- Modal: Carga del equipo (stacked bar) -->
  <div id="modal-team-load" class="chart-modal" hidden>
    <div class="chart-modal-overlay" onclick="closeModal('modal-team-load')"></div>
    <div class="chart-modal-box chart-modal-wide">
      <div class="chart-modal-header">
        <h3>Carga del Equipo por Persona</h3>
        <button class="chart-modal-close" onclick="closeModal('modal-team-load')">✕</button>
      </div>
      <div class="chart-modal-body">
        <canvas id="chart-team-load"></canvas>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
